<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists - HTML</title>
</head>
<body>
    <!--Unordered List: Created using <ul> tag and each list item is created using <li> tag. Each list item in this begins with a bullet point-->
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <!--Ordered List: Created using <ol> tag and each list item is created using <li> tag. Each list item in this begins with a number-->
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ol>
</body>
</html>
