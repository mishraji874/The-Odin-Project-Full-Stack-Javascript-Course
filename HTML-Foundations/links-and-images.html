<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links and Images - HTML</title>
</head>
<body>
    <h1>Homepage</h1>

    <!--Anchor tag is used to go to the new page or redirecting to the new web page-->
    <a href="https://www.theodinproject.com/about">About The Odin Project</a> <!--href attribute means hyperlink reference to place the link of the page to go the page-->

    <!--href specifies the destination link, target specifies where the linked resource will be opened and if it is not present then it will take on the `_self` value which opens the link in the current tab. to open it in the new tab or window set it to `_blank`-->
    <a href="https://www.theodinproject.com/about" target="_blank" rel="noopener noreferrer">About The Odin Project</a>

    <!--noopener value of the rel attribute ensures that a link opened in a new tab or window cannot interact with or access the original page.-->
    <a href="https://example.com" target="_blank" rel="noopener">Open Example</a>

    <!--noreferrer value of the rel attribute provides both privacy and security. It prevents the new page from knowing where the user came from (hiding the referrer) and also includes the behavior of noopener, preventing the new page from accessing the original page.-->
    <a href="https://example.com" target="_blank" rel="noreferrer">Visit Example</a>

    <a href="about.html">About</a>

    <!--Images-->
    <!--src attribute is used to give the source of the image and alt attribute is used to give the alternative text if the image source is not correctly defined-->
    <img src="https://www.theodinproject.com/mstile-310x310.png" alt="The Odin Project Logo" height="310" width="310"> <!--height and width attributes are used to give the desired height and width to the image-->
</body>
</html>
