<!DOCTYPE html> <!--DOCTYPE is used to tell the browser that which version of the html is used-->
<html lang="en"> <!--lang means language-->
    <head> <!--head tag is used to put the important meta-information about our webpages-->
        <meta charset="UTF-8"> <!--charset is used to define the character set of the document-->
        <title>My First Webpage</title> <!--title tag is used to display the title of the webpage-->
    </head>

    <body> <!--body tag is used to display all the contents in the webpage-->
        <h1>Hello World!</h1>
    </body>
</html>
